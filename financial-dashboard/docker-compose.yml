services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finapp_dev}
      POSTGRES_DB: ${POSTGRES_DB:-finapp_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finapp} -d ${POSTGRES_DB:-finapp_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
